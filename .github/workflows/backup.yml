name: Daily Backup

on:
  push:
    branches: [main]
  schedule:
    # Runs daily at 2am Eastern (7am UTC)
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Backup workspace files
        run: |
          cd ${{ github.workspace }}
          echo "Backup test ran at $(date)" >> test_output.txt
          cat test_output.txt
